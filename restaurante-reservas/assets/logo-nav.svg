<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" role="img" aria-label="Reservas Restaurante">
  <!-- Plato -->
  <circle cx="22" cy="22" r="20" fill="#C8334F"/>
  <circle cx="22" cy="22" r="17" fill="#FBE9D0"/>
  <circle cx="22" cy="22" r="15" fill="none" stroke="#C9A227" stroke-width="0.6"/>

  <!-- Cuchillo (8 en punto) -->
  <g transform="translate(22 22) rotate(240)">
    <rect x="-1.25" y="-3.5" width="2.5" height="3.5" rx="0.5" fill="#1F2937"/>
    <path d="M -1.15 -3.5 L -1.15 -9 L 0 -11 L 1.15 -9 L 1.15 -3.5 Z" fill="#1F2937"/>
  </g>

  <!-- Tenedor (12 en punto) -->
  <g transform="translate(22 22)">
    <rect x="-0.9" y="-7.5" width="1.8" height="7.5" rx="0.4" fill="#1F2937"/>
    <rect x="-2.2" y="-9.5" width="4.4" height="2"   rx="0.4" fill="#1F2937"/>
    <rect x="-2"    y="-13.5" width="0.7" height="4" fill="#1F2937"/>
    <rect x="-0.95" y="-13.5" width="0.7" height="4" fill="#1F2937"/>
    <rect x="0.25"  y="-13.5" width="0.7" height="4" fill="#1F2937"/>
    <rect x="1.3"   y="-13.5" width="0.7" height="4" fill="#1F2937"/>
  </g>

  <!-- Tornillo central -->
  <circle cx="22" cy="22" r="1.4" fill="#C8334F"/>

  <!-- Wordmark en crema (sobre navbar oscura) -->
  <text x="52" y="29"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="500" fill="#FBE9D0"
        letter-spacing="0.3">Reservas</text>
</svg>
