<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" role="img" aria-label="Reservas Restaurante">
  <!-- Plato (rim, cara, anillo dorado) -->
  <circle cx="160" cy="95" r="78" fill="#C8334F"/>
  <circle cx="160" cy="95" r="68" fill="#FBE9D0"/>
  <circle cx="160" cy="95" r="62" fill="none" stroke="#C9A227" stroke-width="1"/>

  <!-- Marcadores horarios en 12, 3, 6, 9 -->
  <circle cx="160" cy="29" r="2.4" fill="#1F2937"/>
  <circle cx="226" cy="95" r="2.4" fill="#1F2937"/>
  <circle cx="160" cy="161" r="2.4" fill="#1F2937"/>
  <circle cx="94"  cy="95" r="2.4" fill="#1F2937"/>

  <!-- Cuchillo (aguja de las horas hacia las 8) -->
  <g transform="translate(160 95) rotate(240)">
    <rect x="-4" y="-12" width="8" height="12" rx="1.8" fill="#1F2937"/>
    <path d="M -3.7 -12 L -3.7 -34 L 0 -40 L 3.7 -34 L 3.7 -12 Z" fill="#1F2937"/>
  </g>

  <!-- Tenedor (aguja de los minutos hacia las 12) -->
  <g transform="translate(160 95)">
    <rect x="-3.2" y="-29" width="6.4" height="29" rx="1.7" fill="#1F2937"/>
    <rect x="-7.5" y="-37" width="15" height="8" rx="1.7" fill="#1F2937"/>
    <rect x="-6.6"  y="-52" width="1.7" height="15" rx="0.5" fill="#1F2937"/>
    <rect x="-2.9"  y="-52" width="1.7" height="15" rx="0.5" fill="#1F2937"/>
    <rect x="0.85"  y="-52" width="1.7" height="15" rx="0.5" fill="#1F2937"/>
    <rect x="4.6"   y="-52" width="1.7" height="15" rx="0.5" fill="#1F2937"/>
  </g>

  <!-- Tornillo central -->
  <circle cx="160" cy="95" r="4.6" fill="#C8334F"/>
  <circle cx="160" cy="95" r="2"   fill="#FBE9D0"/>

  <!-- Wordmark -->
  <text x="160" y="210" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="500" fill="#1F2937"
        letter-spacing="0.3">Reservas</text>

  <!-- Ornamento decorativo -->
  <line x1="90"  y1="228" x2="148" y2="228" stroke="#C9A227" stroke-width="1"/>
  <circle cx="160" cy="228" r="2.2" fill="#C9A227"/>
  <line x1="172" y1="228" x2="230" y2="228" stroke="#C9A227" stroke-width="1"/>

  <!-- Tagline -->
  <text x="160" y="252" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="10.5" font-weight="500" fill="#C8334F"
        letter-spacing="6">RESTAURANTE</text>
</svg>
